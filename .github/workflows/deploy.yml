name: Deploy Logic App POC

on:
  push:
    branches: [main]
    paths:
      - 'logic-apps/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Validate workflow files
  # ─────────────────────────────────────────────
  validate:
    name: Validate workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate JSON files are well-formed
        run: |
          echo "Validating workflow JSON files..."
          for f in $(find logic-apps -name "*.json"); do
            echo "Checking $f"
            python3 -c "import json, sys; json.load(open('$f'))" && echo "  OK" || { echo "  FAILED: $f is not valid JSON"; exit 1; }
          done
          echo "All JSON files valid."

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to staging Logic App
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    needs: validate
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip workflow files
        run: |
          cd logic-apps
          zip -r ../logicapp-deploy.zip .
          echo "Package contents:"
          unzip -l ../logicapp-deploy.zip

      - name: Deploy ZIP to staging Logic App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.STAGING_LOGIC_APP_NAME }}
          package: logicapp-deploy.zip

      - name: Wait for staging to warm up
        run: sleep 20

      - name: Get staging callback URL for testing
        run: |
          echo "======================================================"
          echo " STAGING DEPLOY COMPLETE"
          echo " Test your staging workflows at:"
          echo " https://portal.azure.com → la-poc-staging → Workflows"
          echo ""
          CALLBACK=$(az rest \
            --method POST \
            --uri "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ secrets.STAGING_LOGIC_APP_NAME }}/hostruntime/runtime/webhooks/workflow/api/management/workflows/healthcheck/triggers/manual/listCallbackUrl?api-version=2022-03-01" \
            --query value -o tsv 2>/dev/null || echo "URL not available yet")
          echo " Staging healthcheck URL: $CALLBACK"
          echo "======================================================"

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to production (requires approval)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   # <-- manual approval gate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip workflow files
        run: |
          cd logic-apps
          zip -r ../logicapp-deploy.zip .

      - name: Deploy ZIP to production Logic App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.LOGIC_APP_NAME }}
          package: logicapp-deploy.zip

      - name: Wait for production to warm up
        run: sleep 20

      - name: Smoke test — production healthcheck
        run: |
          echo "Running smoke test on production..."
          CALLBACK=$(az rest \
            --method POST \
            --uri "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ secrets.LOGIC_APP_NAME }}/hostruntime/runtime/webhooks/workflow/api/management/workflows/healthcheck/triggers/manual/listCallbackUrl?api-version=2022-03-01" \
            --query value -o tsv)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CALLBACK")
          echo "Production response: $STATUS"
          [ "$STATUS" = "200" ] || { echo "Smoke test FAILED"; exit 1; }
          echo "Production is healthy. Deployment complete."