name: Deploy Logic App POC

on:
  push:
    branches: [main]
    paths:
      - 'logic-apps/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Validate workflow files
  # ─────────────────────────────────────────────
  validate:
    name: Validate workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate JSON files are well-formed
        run: |
          echo "Validating workflow JSON files..."
          for f in $(find logic-apps -name "*.json"); do
            echo "Checking $f"
            python3 -c "import json, sys; json.load(open('$f'))" && echo "  OK" || { echo "  FAILED: $f is not valid JSON"; exit 1; }
          done
          echo "All JSON files valid."

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to staging slot
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging slot
    needs: validate
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure staging slot exists
        run: |
          az logicapp deployment slot create \
            --name ${{ secrets.LOGIC_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --slot staging \
            2>/dev/null || echo "Staging slot already exists, continuing."

      - name: Zip workflow files
        run: |
          cd logic-apps
          zip -r ../logicapp-deploy.zip .
          echo "Package contents:"
          unzip -l ../logicapp-deploy.zip

      - name: Deploy ZIP to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.LOGIC_APP_NAME }}
          slot-name: staging
          package: logicapp-deploy.zip

      - name: Wait for staging slot to warm up
        run: sleep 20

      - name: Smoke test — healthcheck workflow
        run: |
          echo "Fetching callback URL for healthcheck workflow on staging slot..."

          CALLBACK=$(az rest \
            --method POST \
            --uri "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ secrets.LOGIC_APP_NAME }}/slots/staging/hostruntime/runtime/webhooks/workflow/api/management/workflows/healthcheck/triggers/manual/listCallbackUrl?api-version=2022-03-01" \
            --query value -o tsv)

          echo "Calling healthcheck endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CALLBACK")

          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — staging slot returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED — staging slot is healthy"

  # ─────────────────────────────────────────────
  # JOB 3: Swap staging → production (requires approval)
  # ─────────────────────────────────────────────
  swap-to-production:
    name: Swap staging to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   # <-- this triggers the manual approval gate

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging slot → production
        run: |
          echo "Swapping staging → production..."
          az logicapp deployment slot swap \
            --name ${{ secrets.LOGIC_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production
          echo "Swap complete. Production is now running the new version."

      - name: Post-swap smoke test — production
        run: |
          echo "Running post-swap smoke test on production slot..."

          CALLBACK=$(az rest \
            --method POST \
            --uri "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ secrets.LOGIC_APP_NAME }}/hostruntime/runtime/webhooks/workflow/api/management/workflows/healthcheck/triggers/manual/listCallbackUrl?api-version=2022-03-01" \
            --query value -o tsv)

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CALLBACK")
          echo "Production response status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Post-swap smoke test FAILED — consider rolling back"
            echo "Run: az logicapp deployment slot swap --name ${{ secrets.LOGIC_APP_NAME }} --resource-group ${{ secrets.RESOURCE_GROUP }} --slot staging --target-slot production"
            exit 1
          fi
          echo "Production is healthy. Deployment complete."
